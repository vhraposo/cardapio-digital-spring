# ===============================
# APLICACAO
# ===============================
spring.application.name=cardapio-backend
server.port=8080

# ===============================
# BANCO DE DADOS (H2 persistido em arquivo local - sobrevive a restarts)
#
# IMPORTANTE: antes estava configurado como "jdbc:h2:mem:..." (em memoria).
# O spring-boot-devtools reinicia a aplicacao automaticamente sempre que
# detecta uma recompilacao (comum ao salvar um arquivo na IDE com build
# automatico ligado) - e cada restart apagava TODO o banco em memoria,
# inclusive pedidos recem-criados. Por isso os pedidos "sumiam".
#
# Trocando para arquivo, os dados ficam salvos em ./data/cardapiodb.mv.db
# e sobrevivem a restarts. Para resetar o banco do zero, basta apagar essa
# pasta "data/" (ja esta no .gitignore).
# ===============================
spring.datasource.url=jdbc:h2:file:./data/cardapiodb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

