# ===============================
# CORS - libera o front-end React (ajustar em producao)
# ===============================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ===============================
# UPLOAD DE IMAGENS DE PRODUTOS
# ===============================
app.upload.dir=uploads/products
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===============================
# PAGAMENTO (gateway simulado - ver PaymentService)
# Troque por chaves reais do Mercado Pago/Stripe quando integrar de verdade
# ===============================
payment.gateway.provider=SIMULADO
payment.gateway.api-key=CHANGE_ME
